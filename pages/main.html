<!DOCTYPE html>
<html>
    <head>
        <title>Trang chủ Đặng Đình Nguyên</title>
        <style>
            .full-img {
                width: 100%;
                height: 100%;
                object-fit: cover; 
            }
            td[width="30%"] {
                background-color: #f8f9fa !important; /* Màu xám rất nhạt */
                padding: 20px !important;
                border-right: 1px solid #ddd;
            }

            td[width="30%"] strong {
                display: block;
                margin-top: 15px;
                color: #333;
                border-left: 4px solid pink;
                padding-left: 10px;
                font-size: 14px;
            }

            td[width="30%"] a {
                display: block;
                padding: 8px 12px;
                margin: 5px 0;
                color: #555;
                text-decoration: none;
                border-radius: 5px;
                transition: 0.3s;
                font-size: 13px;
            }

            td[width="30%"] a:hover {
                background-color: pink;
                color: white;
                padding-left: 20px; /* Hiệu ứng trượt nhẹ khi hover */
            }
            html, body {
                margin: 0;
                padding: 0;
                height: 100vh;
                width: 100vw;
                overflow: hidden; /* Chặn cuộn chuột */
                font-family: 'Segoe UI', Arial, sans-serif;
            }
            .main-table {
                width: 100%;
                height: 100vh; /* Luôn cao bằng đúng màn hình thiết bị */
                border-collapse: collapse;
                table-layout: fixed; /* Giữ cố định tỉ lệ các cột */
            }
            .header-cell {
                height: 15vh; /* Chiếm 15% chiều cao màn hình */
                background-image: url('assets/images/vozer.jpg');
                background-size: cover;
                background-position: center;
                position: relative;
            }
            .nav-bar {
                height: 5vh; /* Chiếm 5% chiều cao */
                background-color: pink;
                text-align: center;
            }
            .sidebar {
                width: 20%; /* Bạn có thể chỉnh 15% hoặc 20% tùy ý */
                background-color: #f8f9fa !important;
                vertical-align: top;
                padding: 15px;
                border-right: 1px solid #ddd;
                /* Nếu danh sách quá dài thì chỉ cuộn riêng trong cột này */
                overflow-y: auto; 
            }

            .sidebar a {
                display: block;
                padding: 8px 12px;
                margin: 4px 0;
                color: #555;
                text-decoration: none;
                border-radius: 6px;
                font-size: 0.9rem;
                transition: 0.3s;
            }

            .sidebar a:hover {
                background-color: pink;
                color: white;
                padding-left: 20px;
            }
            .content-cell {
                width: 80%;
                height: 80vh; /* Chiếm 80% chiều cao còn lại */
                background-color: white;
            }

            iframe {
                width: 100%;
                height: 100%;
                border: none;
            }
            .footer-cell {
                height: 5vh;
                background-color: #333;
                color: white;
                text-align: center;
                font-size: 12px;
            }
        </style>
    </head>

                </td>
            </tr>

            <tr>
                <td colspan="2" class="nav-bar">
                    <a href="portfolio.html" target="main">Hồ sơ năng lực</a> | 
                    <a href="myproject.html" target="main">Dự án</a>
                </td>
            </tr>

            <tr>
                <td class="sidebar">
                    <strong>DANH SÁCH NHẠC</strong>
                    <a href="...">Nhạc trẻ</a>
                    <a href="...">Nhạc Bolero</a>
                    </td>
                <td class="content-cell">

                </td>
            </tr>

            <tr>
                <td colspan="2" class="footer-cell">
                    MSSV: 110125113 - Đặng Đình Nguyên - DA25TTD
                </td>
            </tr>
        </table>
    </body>
</html>
