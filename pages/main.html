<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trang chủ Đặng Đình Nguyên</title>
    <style>
        /* 1. Thiết lập chung: Chặn cuộn toàn trang */
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* Không cho cả trang cuộn */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* 2. Cấu trúc Bảng chính: Full màn hình */
        .main-layout {
            width: 100%;
            height: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        /* 3. Header: Cố định chiều cao */
        .header-cell {
            height: 18vh;
            background-image: url('assets/images/vozer.jpg');
            background-size: cover;
            background-position: center;
            background-color: #f5e6c8;
            position: relative;
            border-bottom: 2px solid pink;
        }

        .logout-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            color: white;
            background-color: rgba(255, 0, 0, 0.7);
            padding: 5px 15px;
            text-decoration: none;
            border-radius: 20px;
            font-weight: bold;
            font-size: 12px;
            transition: 0.3s;
        }
        .logout-btn:hover { background-color: red; }

        /* 4. Thanh Navigation */
        .nav-bar {
            height: 6vh;
            background-color: pink;
            text-align: center;
            vertical-align: middle;
        }
        .nav-bar a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
            margin: 0 15px;
            transition: 0.3s;
        }
        .nav-bar a:hover { color: white; }

        /* 5. Sidebar: Cho phép cuộn nếu danh sách quá dài */
        .sidebar {
            width: 20%;
            background-color: #f8f9fa;
            vertical-align: top;
            padding: 0; /* Để padding vào div bên trong */
            border-right: 1px solid #ddd;
        }

        .sidebar-scroll {
            height: 71vh; /* Chiều cao còn lại sau khi trừ header/nav/footer */
            overflow-y: auto; /* Chỉ cuộn riêng cột này */
            padding: 20px;
        }

        .sidebar-scroll strong {
            display: block;
            margin-top: 15px;
            color: #333;
            border-left: 4px solid pink;
            padding-left: 10px;
            font-size: 14px;
        }

        .sidebar-scroll a {
            display: block;
            padding: 8px 12px;
            margin: 5px 0;
            color: #555;
            text-decoration: none;
            border-radius: 5px;
            font-size: 13px;
            transition: 0.3s;
        }

        .sidebar-scroll a:hover {
            background-color: pink;
            color: white;
            padding-left: 20px;
        }

        /* 6. Nội dung chính: Iframe */
        .content-cell {
            width: 80%;
            height: 71vh;
            background-color: white;
            vertical-align: top;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 7. Footer */
        .footer-cell {
            height: 5vh;
            background-color: #333;
            color: white;
            text-align: center;
            font-size: 12px;
        }
    </style>
</head>
