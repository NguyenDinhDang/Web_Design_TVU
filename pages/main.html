<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trang chủ Đặng Đình Nguyên</title>
    <style>
        /* 1. Ép Full màn hình 100% */
        html, body {
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            overflow: hidden; 
            font-family: "Times New Roman", Times, serif;
        }

        .main-table {
            width: 100%; height: 100vh;
            border-collapse: collapse;
            table-layout: fixed; /* Ép buộc trình duyệt tuân thủ width của cột */
        }

        /* 2. Header (15%) */
        .header-cell {
            height: 15vh;
            background-color: #faebd7; 
            position: relative;
            border-bottom: 1px solid #ccc;
        }

        .logout-btn {
            position: absolute; top: 15px; left: 20px; 
            color: red; border: 1px solid red; 
            padding: 3px 15px; text-decoration: none; 
            border-radius: 15px; font-weight: bold;
            background-color: white;
        }

        /* 3. Thanh Menu Pink (5%) */
        .nav-bar {
            height: 5vh;
            background-color: pink;
            text-align: center;
            border-bottom: 1px solid #999;
        }

        .nav-bar a {
            color: black; font-weight: bold; 
            text-decoration: none; margin: 0 20px;
        }

        /* 4. Sidebar Vàng (10%) */
        .sidebar {
            width: 10%; /* Cố định 10% */
            background-color: yellow; 
            vertical-align: top;
            border-right: 1px solid #ccc;
        }

        .sidebar-scroll {
            height: 75vh; 
            overflow-y: auto; 
            padding: 10px;
            box-sizing: border-box; /* Đảm bảo padding không làm tăng chiều rộng */
        }

        .sidebar-scroll strong {
            display: block;
            margin-top: 10px; margin-bottom: 5px;
            font-size: 11px; /* Hạ nhẹ font để tránh tràn cột 10% */
            word-wrap: break-word;
        }

        .sidebar-scroll a {
            display: block;
            color: blue;
            text-decoration: underline;
            margin-bottom: 6px;
            font-size: 11px;
            word-wrap: break-word; /* Ép chữ xuống dòng nếu quá dài */
        }
        
        .sidebar-scroll a:hover { color: red; }

        /* 5. Nội dung Aqua (90%) */
        .content-cell {
            width: 90%; /* Cố định 90% */
            background-color: aqua;
            vertical-align: top;
            padding: 0;
        }

        iframe {
            width: 100%; height: 100%; border: none;
            display: block; /* Loại bỏ khoảng trống thừa bên dưới iframe */
        }

        /* 6. Footer (5%) */
        .footer-cell {
            height: 5vh;
            background-color: #eeeeee;
            text-align: center;
            font-size: 13px;
            font-weight: bold;
            border-top: 1px solid #ccc;
        }
    </style>
</head>
