<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trang chủ Đặng Đình Nguyên</title>
    <style>
        /* 1. Kỹ thuật ép Full màn hình, không cho cuộn trang */
        html, body {
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            overflow: hidden; 
            font-family: "Times New Roman", Times, serif; /* Trả lại font chữ cơ bản */
        }

        /* 2. Giữ nguyên cấu trúc Bảng của bạn */
        .main-table {
            width: 100%; height: 100vh;
            border-collapse: collapse;
            table-layout: fixed; /* Ép kích thước không bị vỡ */
        }

        /* 3. Header: Giữ nền màu kem nhạt và Nút Đăng Xuất bên trái */
        .header-cell {
            height: 15vh;
            background-color: #faebd7; /* Màu nền kem nhạt giống ảnh của bạn */
            position: relative;
            border-bottom: 1px solid #ccc;
        }

        .logout-btn {
            position: absolute; top: 15px; left: 20px; 
            color: red; border: 1px solid red; 
            padding: 3px 15px; text-decoration: none; 
            border-radius: 15px; font-weight: bold;
            background-color: white;
        }

        /* 4. Thanh Menu: Trả lại màu Hồng đặc trưng */
        .nav-bar {
            height: 5vh;
            background-color: pink;
            text-align: center;
            border-bottom: 1px solid #999;
        }

        .nav-bar a {
            color: black; font-weight: bold; 
            text-decoration: none; margin: 0 20px;
        }

        /* 5. Sidebar: Trả lại màu Vàng nguyên bản và Link màu xanh */
        .sidebar {
            width: 25%; /* Giữ sidebar hẹp để nhường chỗ cho Iframe */
            background-color: yellow; 
            vertical-align: top;
            border-right: 1px solid #ccc;
        }

        /* Thêm thẻ div này để chỉ cuộn danh sách nhạc/phim nếu nó quá dài */
        .sidebar-scroll {
            height: 80vh; 
            overflow-y: auto; 
            padding: 10px;
        }

        .sidebar-scroll strong {
            display: block;
            margin-top: 15px; margin-bottom: 10px;
        }

        .sidebar-scroll a {
            display: block;
            color: blue; /* Link màu xanh dương gạch chân như bạn muốn */
            text-decoration: underline;
            margin-bottom: 8px;
        }
        
        /* Đổi màu đỏ khi đưa chuột vào link cho dễ nhìn */
        .sidebar-scroll a:hover {
            color: red; 
        }

        /* 6. Nội dung chính: Trả lại màu Aqua */
        .content-cell {
            width: 75%;
            background-color: aqua;
            vertical-align: top;
        }

        iframe {
            width: 100%; height: 100%; border: none;
        }
    </style>
</head>
<body>

    <table border="1" class="main-table">
        <tr>
            <td colspan="2" class="header-cell">
                <a href="../index.html" class="logout-btn">Đăng Xuất</a>
            </td>
        </tr>

        <tr>
            <td colspan="2" class="nav-bar">
                <a href="#">Trang Chủ</a>
                <a href="#">Giới Thiệu</a>
                <a href="portfolio.html" target="main">Dự Án Của Tôi</a>
                <a href="style.html" target="main">Liên Hệ</a>
            </td>
        </tr>

        <tr>
            <td class="sidebar">
                <div class="sidebar-scroll">
                    <strong>DANH SÁCH: NHẠC</strong>
                    <a href="link-nhac" target="main">Nhạc Anh Ổ 1</a>
                    <a href="link-nhac" target="main">Data - Structure & Algorithms</a>
                    <a href="link-nhac" target="main">Fung Thank Do</a>

                    <br>
                    <strong>DANH SÁCH: PHIM</strong>
                    <a href="link-phim" target="main">Phim KungFu Phở</a>
                    <a href="link-phim" target="main">John Wick</a>
                    <a href="link-phim" target="main">Bố Già</a>

                    <br>
                    <strong>DANH SÁCH: SÁCH</strong>
                    <a href="link-sach" target="main">Chủ Nghĩa Khắc Kỷ</a>
                    <a href="link-sach" target="main">Marx-Lenin</a>
                    <a href="link-sach" target="main">Chủ nghĩa xã hội</a>
                </div>
            </td>

            <td class="content-cell">
                <iframe name="main" src="portfolio.html"></iframe>
            </td>
        </tr>
    </table>

</body>
</html>
