<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trang chủ Đặng Đình Nguyên</title>
    <style>
        /* 1. Reset và thiết lập khung hình toàn màn hình */
        html, body {
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            overflow: hidden; 
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .main-table {
            width: 100%; height: 100vh;
            border-collapse: collapse;
            table-layout: fixed; /* Ép trình duyệt tuân thủ tuyệt đối tỷ lệ % */
        }

        /* 2. Header (15%) */
        .header-cell {
            height: 15vh;
            background-color: #faebd7; 
            position: relative;
            border-bottom: 1px solid #ccc;
        }

        .logout-btn {
            position: absolute; top: 15px; left: 20px; 
            color: red; border: 1px solid red; 
            padding: 5px 15px; text-decoration: none; 
            border-radius: 20px; font-weight: bold;
            background-color: white;
            transition: 0.3s;
        }
        .logout-btn:hover {
            background-color: red;
            color: white;
        }

        /* 3. Thanh Menu Pink (5%) */
        .nav-bar {
            height: 5vh;
            background-color: pink;
            text-align: center;
            border-bottom: 1px solid #999;
        }

        .nav-bar a {
            color: black; font-weight: bold; 
            text-decoration: none; margin: 0 20px;
            line-height: 5vh; /* Căn giữa chữ theo chiều dọc */
        }
        .nav-bar a:hover { text-decoration: underline; }

        /* 4. Sidebar Vàng (10%) */
        .sidebar {
            width: 10%;
            background-color: #ffeb3b; 
            vertical-align: top;
            border-right: 1px solid #ddd;
        }

        .sidebar-scroll {
            height: 75vh; 
            overflow-y: auto; 
            padding: 15px 10px;
            box-sizing: border-box;
        }

        /* Tùy chỉnh thanh cuộn Sidebar cho đẹp */
        .sidebar-scroll::-webkit-scrollbar { width: 4px; }
        .sidebar-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }

        .sidebar-scroll strong {
            display: block;
            margin: 15px 0 8px 5px;
            font-size: 11px;
            color: #666;
            letter-spacing: 1px;
            border-left: 3px solid #e91e63;
            padding-left: 8px;
            text-transform: uppercase;
        }

        /* Style link Sidebar mới */
        .sidebar-scroll a {
            display: block;
            color: #444;
            text-decoration: none;
            padding: 10px 12px;
            margin-bottom: 6px;
            font-size: 12px;
            background-color: rgba(255, 255, 255, 0.4);
            border-radius: 8px;
            transition: all 0.3s ease;
            white-space: nowrap; /* Không cho xuống dòng */
            overflow: hidden;
            text-overflow: ellipsis; /* Hiện ... nếu tên quá dài */
        }

        .sidebar-scroll a:hover {
            color: #fff;
            background-color: #e91e63; /* Màu hồng đậm khi hover */
            padding-left: 16px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transform: translateX(2px);
        }

        /* 5. Nội dung chính Aqua (90%) */
        .content-cell {
            width: 90%;
            background-color: aqua;
            vertical-align: top;
            padding: 0;
        }

        iframe {
            width: 100%; height: 100%; border: none;
            display: block;
        }

        /* 6. Footer (5%) */
        .footer-cell {
            height: 5vh;
            background-color: #f5f5f5;
            text-align: center;
            font-size: 12px;
            color: #333;
            border-top: 1px solid #ddd;
        }
    </style>
</head>
