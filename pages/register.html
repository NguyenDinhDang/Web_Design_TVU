<!DOCTYPE html>
<html>
<head>
    <title>Đăng ký bán linh hồn cho quỷ dữ</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
        }
        .back-btn {
            color: white;
            height: 40px;
            width: 220px;
            background-color: #e74c3c;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            margin-bottom: 20px;
        }
        .back-btn:hover {
            background-color: #c0392b;
            transform: scale(1.05);
        }

        .registration-table {
            border: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 15px;
            overflow: hidden; 
            background-color: white;
        }

        input[type="text"], input[type="email"], input[type="tel"], input[type="password"] {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            outline: none;
            width: 90%;
        }
        input:focus {
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }
        .btn-submit {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-submit:hover {
            background-color: #2980b9;
        }


        .btn-reset {
            background-color: #ecf0f1;
            border: 1px solid #bdc3c7;
            padding: 10px 30px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body bgcolor="#f0f0f0">
    <br><br>
    <a href="../index.html">
        <button style="color: black; height: 30px; width: 250px; background-color: red; cursor: pointer;">
            Quay về trang đăng nhập
        </button>
    </a>
    <table border="1" width="450" align="center" bgcolor="white" cellpadding="10" cellspacing="0">
        <tr>
            <td colspan="2" align="center" bgcolor="lightblue" height="50">
                <h2>ĐĂNG KÝ TÀI KHOẢN</h2>
            </td>
        </tr>
        <tr>
            <td width="40%" align="right"><b>Họ và tên:</b></td>
            <td><input type="text" id="hoten" placeholder="Nhập họ và tên" size="25"></td>
        </tr>

        <tr>
            <td align="right"><b>Email:</b></td>
            <td><input type="email" id="emailInput" placeholder="Nhập email" size="25"></td>
        </tr>

        <tr>
            <td align="right"><b>Số điện thoại:</b></td>
            <td><input type="tel" id="sdt" placeholder="Nhập số điện thoại" size="25"></td>
        </tr>

        <tr>
            <td align="right"><b>Mật khẩu:</b></td>
            <td><input type="password" id="passInput" placeholder="Nhập mật khẩu" size="25"></td>
        </tr>

        <tr>
            <td colspan="2" align="center">
                <input type="button" value="Đăng Ký" onclick="xuLyDangKy()" style="background-color: lightblue; font-weight: bold; padding: 5px 20px; cursor: pointer;">
                &nbsp;&nbsp;
                <input type="reset" value="Xóa" style="padding: 5px 20px;">
            </td>
        </tr>
    </table>

    <center>
        <div id="resultBox" style="margin-top: 20px; width: 400px; text-align: left;"></div>
    </center>

    <script>
    function xuLyDangKy() {
        const hoTen = document.getElementById('hoten').value;
        const email = document.getElementById('emailInput').value;
        const pass = document.getElementById('passInput').value;
        const result = document.getElementById('resultBox');
        if (hoTen === "" || email === "" || pass === "") {
            alert("Vui lòng nhập đầy đủ thông tin!");
            return;
        }
        result.innerHTML = `
            <div style="background-color: #d4edda; color: #155724; padding: 20px; border-radius: 8px; border: 1px solid #c3e6cb; font-family: sans-serif;">
                <h3 style="margin: 0 0 10px 0;">Đăng ký thành công!</h3>
                <p><b>Họ tên:</b> ${hoTen}</p>
                <p><b>Email:</b> ${email}</p>
                <p><b>Mật khẩu:</b> *************</p>
                <hr>
                <small>Hệ thống đã ghi nhận thông tin của bạn.</small>
            </div>
        `;
    }
    </script>

</body>
</html>
