<!DOCTYPE html>
<html>
    <head>
        <title>Đăng Ký</title>
    </head>
    <body bgcolor="#f0f0f0">

        <br><br>

        <table border="1" width="450" align="center" bgcolor="white" cellpadding="10" cellspacing="0">

            <tr>
                <td colspan="2" align="center" bgcolor="lightblue" height="50">
                    <h2>ĐĂNG KÝ TÀI KHOẢN</h2>
                </td>
            </tr>

            <tr>
                <td width="40%" align="right"><b>Họ và tên:</b></td>
                <td>
                    <input type="text" name="hoten" placeholder="Nhập họ và tên" size="25">
                </td>
            </tr>

            <tr>
                <td align="right"><b>Email:</b></td>
                <td>
                    <input type="email" name="email" placeholder="Nhập email" size="25">
                </td>
            </tr>

            <tr>
                <td align="right"><b>Số điện thoại:</b></td>
                <td>
                    <input type="tel" name="sdt" placeholder="Nhập số điện thoại" size="25">
                </td>
            </tr>

            <tr>
                <td align="right"><b>Giới tính:</b></td>
                <td>
                    <input type="radio" name="gioitinh" value="nam"> Nam
                    &nbsp;
                    <input type="radio" name="gioitinh" value="nu"> Nữ
                    &nbsp;
                    <input type="radio" name="gioitinh" value="khac"> Khác
                </td>
            </tr>

            <tr>
                <td align="right"><b>Mật khẩu:</b></td>
                <td>
                    <input type="password" name="matkhau" placeholder="Nhập mật khẩu" size="25">
                </td>
            </tr>

            <tr>
                <td align="right"><b>Xác nhận mật khẩu:</b></td>
                <td>
                    <input type="password" name="xacnhan" placeholder="Nhập lại mật khẩu" size="25">
                </td>
            </tr>

            <tr>
                <td colspan="2" align="center">
                    <input type="checkbox" name="dieukoan"> 
                    Tôi đồng ý với <a href="#">điều khoản sử dụng</a>
                </td>
            </tr>

            <tr>
                <td colspan="2" align="center">
                    <input type="button" value="Đăng Ký" onclick="window.location.href='index.html'"style="background-color: lightblue; font-weight: bold; padding: 5px 20px;">
                    &nbsp;&nbsp;
                    <input type="reset" value="Xóa" style="padding: 5px 20px;">
                </td>
            </tr>

            <tr>
                <td colspan="2" align="center" bgcolor="#f9f9f9">
                    Đã có tài khoản? 
                    <a href="index.html">Đăng nhập</a>
                </td>
            </tr>

        </table>

    </body>
</html>
