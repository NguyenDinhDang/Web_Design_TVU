<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Menu</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f7b2c4, #80d0c7, #ffffff);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-table {
            width: min(700px, 92vw);
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.94);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
        }

        .header-cell {
            position: relative;
            background: #ffd6e3;
            padding: 30px 20px;
            text-align: center;
        }

        .header-cell h1 {
            margin: 0;
            font-size: 28px;
            color: #303030;
        }

        .logout-btn {
            position: absolute;
            top: 14px;
            right: 16px;
            color: #ffffff;
            background: #e73c7e;
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
        }

        .nav-bar {
            padding: 22px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 12px;
        }

        .nav-bar a {
            display: block;
            text-align: center;
            color: #222;
            background: #ffffff;
            border: 1px solid #eeeeee;
            border-radius: 10px;
            padding: 14px 16px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
        }

        .nav-bar a:hover {
            border-color: #e73c7e;
            color: #e73c7e;
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(231, 60, 126, 0.15);
        }
    </style>
</head>
<body>
    <table class="main-table">
        <tr>
            <td class="header-cell">
                <a href="../index.html" class="logout-btn">Đăng xuất</a>
                <h1>Chào mừng đến với trang menu</h1>
            </td>
        </tr>
        <tr>
            <td class="nav-bar">
                <a href="menu.html">Menu</a>
                <a href="main.html">Trang chính</a>
                <a href="myproject.html">Hồ sơ</a>
                <a href="../110125113/index.html">Buổi thực hành 1</a>
            </td>
        </tr>
    </table>
</body>
</html>
