<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <title>Thông tin đăng ký</title>
</head>
<body bgcolor="lightgray">
    <a href="../pages/menu.html" style="position: fixed; bottom: 20px; left: 20px; background-color: #1a55bb; color: white; padding: 10px 20px; border-radius: 50px; text-decoration: none; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 9999;">
        &#8592; Trở về menu
    </a>
    <br>
    <table align="center" width="820" cellpadding="0" cellspacing="0" border="0" bgcolor="white" style="border-radius: 30px; overflow: hidden;">
        <tr align="center">
            <td bgcolor="red" height="90" align="center" >
                <font size="7" color="pink">
                    <b>Thông tin đăng ký</b>
                </font>
            </td>
        </tr>
        <tr>
            <td>
                <table width="100%" cellpadding="15" cellspacing="0" border="0">
                    <tr>
                        <td width="180" border>
                            <font size="5" color="red">Họ tên:</font>
                        </td>
                        <td>
                            <input type="text" placeholder="Nhập họ tên" size="70" style="border: 0; border-bottom: 1px solid black;">
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <font size="5" color="blue">Ngày sinh:</font>
                        </td>
                        <td>
                            <input type="date" size="70" style="border: 0; border-bottom: 1px solid black; width: 90%;">
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <font size="5" color="green">Giới tính:</font>
                        </td>
                        <td>
                            <input type="radio" name="gioitinh"> Nam
                            <input type="radio" name="gioitinh" style="margin-left: 100px;"> Nữ
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <font size="5" color="purple">Địa chỉ:</font>
                        </td>
                        <td>
                            <input type="text" placeholder="Nhập địa chỉ" size="70" style="border: 0; border-bottom: 1px solid black;">
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <font size="5" color="orange">MSSV:</font>
                        </td>
                        <td>
                            <input type="text" placeholder="Nhập mã số sinh viên" size="70" style="border: 0; border-bottom: 1px solid black;">
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <font size="5" color="nigga">Lớp:</font>
                        </td>
                        <td>
                            <select>
                                <option>DA25TTA</option>
                                <option>DA25TTB</option>
                                <option>DA25TTC</option>
                                <option>DA25TTD</option>
                                <option>DA25TT-EIP</option>
                                <option>DA24TTA</option>
                                <option>DA24TTB</option>
                                <option>DA24TTC</option>
                                <option>DA24TTD</option>
                                <option>DA23TTA</option>
                                <option>DA23TTB</option>
                                <option>DA23TTC</option>
                                <option>DA23TTD</option>
                                <option>DA22TTA</option>
                                <option>DA22TTB</option>                                
                                <option>DA22TTC</option>   
                                <option>DA22TTD</option>   
                                <option>DA21TTA</option>   
                                <option>DA21TTB</option>   
                                <option>DA21TTC</option>  
                                <option>DA21TTD</option>    
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <font size="5" color="brown">Số điện thoại:</font>
                        </td>
                        <td>
                            <input type="text" placeholder="Nhập số điện thoại" size="70" style="border: 0; border-bottom: 1px solid black;">
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <font size="5" color="gray">Email:</font>
                        </td>
                        <td>
                            <input type="email" placeholder="Nhập email" size="70" style="border: 0; border-bottom: 1px solid black;">
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <font size="5" color="black">Ảnh đại diện:</font>
                        </td>
                        <td>
                            <input type="file">
                        </td>
                    </tr>
                    <tr>
                        <td valign="top">
                            <font size="5" color="navy">Sở trường:</font>
                        </td>
                        <td>
                            <input type="checkbox"> Web Design
                            <input type="checkbox"> Lập trình Java
                            <input type="checkbox"> Lập trình Python
                            <input type="checkbox"> Lập trình C++ <br>
                            <input type="checkbox"> Lập trình C#
                            <input type="checkbox"> Thành thạo Afghanistan
                        </td>
                    </tr>
                    <tr>
                        <td valign="top">
                            <font size="5" color="navy">Mô tả sơ lược:</font>
                        </td>
                        <td>
                            <textarea rows="8" cols="72"></textarea>
                        </td>
                    </tr>
                    <tr>
                        <td colspan="2" align="center">
                            <br>
                            <input type="reset" value="Hủy bỏ" style="background-color: red; font-weight: bold; padding: 5px 20px; cursor: pointer;">
                            <a href ="../pages/menu.html">
                                <input type="submit" value="Đăng ký" style ="background-color: red; font-weight: bold; padding: 5px 20px; cursor: pointer;">
                            </a>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
