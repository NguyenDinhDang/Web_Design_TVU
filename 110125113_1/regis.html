<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thông tin đăng ký</title>
</head>
<body style="background-color: #f1f3f5; font-family: Arial, sans-serif; margin: 0; padding: 40px 20px;">

    <form action="user.html" method="POST" enctype="multipart/form-data" style="max-width: 820px; margin: 0 auto; background-color: white; border-radius: 30px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding-bottom: 40px;">
        
        <h1 style="background-color: #8ba446; color: black; text-align: center; padding: 25px; font-size: 32px; font-weight: bold; margin: 0 0 40px 0;">
            Thông tin đăng ký
        </h1>

        <p style="padding: 0 50px; margin: 0;">

            <p style="display: flex; margin: 0 0 25px 0; align-items: center;">
                <label style="width: 180px; font-size: 18px;">Họ tên:</label>
                <input type="text" name="hoten" placeholder="Nhập họ tên" style="flex: 1; padding: 5px 0; border: none; border-bottom: 1px solid black; font-size: 16px; outline: none;">
            </p>

            <p style="display: flex; margin: 0 0 25px 0; align-items: center;">
                <label style="width: 180px; font-size: 18px;">Ngày sinh:</label>
                <input type="date" name="ngaysinh" style="flex: 1; padding: 5px 0; border: none; border-bottom: 1px solid black; font-size: 16px; outline: none;">
            </p>

            <p style="display: flex; margin: 0 0 25px 0; align-items: center;">
                <label style="width: 180px; font-size: 18px;">Giới tính:</label>
                <label style="margin-right: 40px; display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 16px;"><input type="radio" name="gioitinh" value="nam"> Nam</label>
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 16px;"><input type="radio" name="gioitinh" value="nu"> Nữ</label>
            </p>

            <p style="display: flex; margin: 0 0 25px 0; align-items: center;">
                <label style="width: 180px; font-size: 18px;">Địa chỉ:</label>
                <input type="text" name="diachi" placeholder="Nhập địa chỉ" style="flex: 1; padding: 5px 0; border: none; border-bottom: 1px solid black; font-size: 16px; outline: none;">
            </p>

            <p style="display: flex; margin: 0 0 25px 0; align-items: center;">
                <label style="width: 180px; font-size: 18px;">MSSV:</label>
                <input type="text" name="mssv" placeholder="Nhập mã số sinh viên" style="flex: 1; padding: 5px 0; border: none; border-bottom: 1px solid black; font-size: 16px; outline: none;">
            </p>

            <p style="display: flex; margin: 0 0 25px 0; align-items: center;">
                <label style="width: 180px; font-size: 18px;">Lớp:</label>
                <select name="lop" style="flex: 1; padding: 5px 0; border: none; border-bottom: 1px solid black; font-size: 16px; outline: none;">
                    <option>DA25TTC</option>
                    <option>DA25TTA</option>
                    <option>DA25TTB</option>
                    <option>DA25TTD</option>
                </select>
            </p>

            <p style="display: flex; margin: 0 0 25px 0; align-items: center;">
                <label style="width: 180px; font-size: 18px;">Số điện thoại:</label>
                <input type="text" name="sdt" placeholder="Nhập số điện thoại" style="flex: 1; padding: 5px 0; border: none; border-bottom: 1px solid black; font-size: 16px; outline: none;">
            </p>

            <p style="display: flex; margin: 0 0 25px 0; align-items: center;">
                <label style="width: 180px; font-size: 18px;">Email:</label>
                <input type="email" name="email" placeholder="Nhập email" style="flex: 1; padding: 5px 0; border: none; border-bottom: 1px solid black; font-size: 16px; outline: none;">
            </p>

            <p style="display: flex; margin: 0 0 25px 0; align-items: center;">
                <label style="width: 180px; font-size: 18px;">Ảnh đại diện:</label>
                <input type="file" name="avatar" style="flex: 1; padding-bottom: 8px; border-bottom: 1px solid black;">
            </p>

            <p style="display: flex; margin: 0 0 25px 0; align-items: center;">
                <label style="width: 180px; font-size: 18px;">Sở trường:</label>
                <label style="margin-right: 40px; display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 16px;"><input type="checkbox" name="sotruong" value="thietke"> Thiết kế web</label>
                <label style="margin-right: 40px; display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 16px;"><input type="checkbox" name="sotruong" value="laptrinh"> Lập trình web</label>
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 16px;"><input type="checkbox" name="sotruong" value="tiengtrung"> Thành thạo tiếng Trung</label>
            </p>

            <p style="display: flex; margin: 0 0 25px 0; align-items: flex-start;">
                <label style="width: 180px; font-size: 18px;">Mô tả sơ lược:</label>
                <textarea name="mota" rows="5" style="flex: 1; border: 1px solid black; border-radius: 4px; padding: 10px; font-size: 16px; outline: none; resize: none;"></textarea>
            </p>

            <p style="text-align: center; margin: 35px 0 0 0; display: flex; justify-content: center; gap: 20px;">
                <input type="reset" value="Hủy bỏ" style="background-color: #8ba446; color: black; font-weight: bold; padding: 10px 30px; cursor: pointer; border: 1px solid #6e8534; border-radius: 6px; font-size: 18px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                
                <a href="user.html" style="text-decoration: none;">
                    <input type="button" value="Đăng ký" style="background-color: #8ba446; color: black; font-weight: bold; padding: 10px 30px; cursor: pointer; border: 1px solid #6e8534; border-radius: 6px; font-size: 18px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                </a>
            </p>

        </p>
    </form>
    <script>
        document.getElementById('btnDangKy').addEventListener('click', function() {
            // 1. Lấy dữ liệu từ các ô nhập liệu bằng thuộc tính name
            let hoTen = document.querySelector('input[name="hoten"]').value;
            let ngaySinh = document.querySelector('input[name="ngaysinh"]').value;
            let diaChi = document.querySelector('input[name="diachi"]').value;
            let mssv = document.querySelector('input[name="mssv"]').value;
            let lop = document.querySelector('select[name="lop"]').value;
            let sdt = document.querySelector('input[name="sdt"]').value;
            let email = document.querySelector('input[name="email"]').value;
            let moTa = document.querySelector('textarea[name="mota"]').value;

            // Lấy giới tính (vì là radio nên phải tìm ô được tích)
            let gioitinhInput = document.querySelector('input[name="gioitinh"]:checked');
            let gioiTinh = gioitinhInput ? gioitinhInput.parentNode.textContent.trim() : "Chưa chọn";

            // Lấy sở trường (tìm các ô checkbox được tích)
            let soTruongArr = [];
            document.querySelectorAll('input[name="sotruong"]:checked').forEach(function(item) {
                soTruongArr.push(item.parentNode.textContent.trim());
            });
            let soTruong = soTruongArr.join(', ');

            // 2. Gom tất cả vào một đối tượng (Object) dữ liệu sinh viên
            let sinhVien = {
                hoten: hoTen,
                ngaysinh: ngaySinh,
                gioitinh: gioiTinh,
                diachi: diaChi,
                mssv: mssv,
                lop: lop,
                sdt: sdt,
                email: email,
                sotruong: soTruong,
                mota: moTa
            };

            // 3. Lưu vào kho LocalStorage của trình duyệt dưới dạng chuỗi văn bản
            localStorage.setItem('thongTinSinhVien', JSON.stringify(sinhVien));

            // 4. Chuyển hướng màn hình sang trang user.html
            window.location.href = 'user.html';
        });
    </script>

</body>
</html>
