<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thông tin cá nhân</title>
</head>
<body style="background-color: #f1f3f5; font-family: Arial, sans-serif; margin: 0; padding: 40px 20px;">

    <form style="max-width: 820px; margin: 0 auto; background-color: white; border-radius: 30px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding-bottom: 40px;">
        
        <h1 style="background-color: #8ba446; color: black; text-align: center; padding: 25px; font-size: 32px; font-weight: bold; margin: 0 0 40px 0;">
            Thông tin cá nhân
        </h1>

        <p style="display: flex; justify-content: center; margin: 0 0 35px 0;">
            <label style="width: 130px; height: 130px; border-radius: 50%; background-color: #e9ecef; border: 2px solid #8ba446; display: flex; align-items: center; justify-content: center; overflow: hidden; color: #6c757d; font-size: 14px;">
                Ảnh đại diện
            </label>
        </p>

        <p style="display: flex; margin: 0 50px 25px 50px; align-items: center; border-bottom: 1px dashed #ccc; padding-bottom: 10px;">
            <label style="width: 180px; font-size: 18px; font-weight: bold; color: #555;">Họ tên:</label>
            <label id="viewHoten" style="font-size: 18px; color: black;"></label>
        </p>

        <p style="display: flex; margin: 0 50px 25px 50px; align-items: center; border-bottom: 1px dashed #ccc; padding-bottom: 10px;">
            <label style="width: 180px; font-size: 18px; font-weight: bold; color: #555;">Ngày sinh:</label>
            <label id="viewNgaysinh" style="font-size: 18px; color: black;"></label>
        </p>

        <p style="display: flex; margin: 0 50px 25px 50px; align-items: center; border-bottom: 1px dashed #ccc; padding-bottom: 10px;">
            <label style="width: 180px; font-size: 18px; font-weight: bold; color: #555;">Giới tính:</label>
            <label id="viewGioitinh" style="font-size: 18px; color: black;"></label>
        </p>

        <p style="display: flex; margin: 0 50px 25px 50px; align-items: center; border-bottom: 1px dashed #ccc; padding-bottom: 10px;">
            <label style="width: 180px; font-size: 18px; font-weight: bold; color: #555;">Địa chỉ:</label>
            <label id="viewDiachi" style="font-size: 18px; color: black;"></label>
        </p>

        <p style="display: flex; margin: 0 50px 25px 50px; align-items: center; border-bottom: 1px dashed #ccc; padding-bottom: 10px;">
            <label style="width: 180px; font-size: 18px; font-weight: bold; color: #555;">MSSV:</label>
            <label id="viewMssv" style="font-size: 18px; color: black;"></label>
        </p>

        <p style="display: flex; margin: 0 50px 25px 50px; align-items: center; border-bottom: 1px dashed #ccc; padding-bottom: 10px;">
            <label style="width: 180px; font-size: 18px; font-weight: bold; color: #555;">Lớp:</label>
            <label id="viewLop" style="font-size: 18px; color: black;"></label>
        </p>

        <p style="display: flex; margin: 0 50px 25px 50px; align-items: center; border-bottom: 1px dashed #ccc; padding-bottom: 10px;">
            <label style="width: 180px; font-size: 18px; font-weight: bold; color: #555;">Số điện thoại:</label>
            <label id="viewSdt" style="font-size: 18px; color: black;"></label>
        </p>

        <p style="display: flex; margin: 0 50px 25px 50px; align-items: center; border-bottom: 1px dashed #ccc; padding-bottom: 10px;">
            <label style="width: 180px; font-size: 18px; font-weight: bold; color: #555;">Email:</label>
            <label id="viewEmail" style="font-size: 18px; color: black;"></label>
        </p>

        <p style="display: flex; margin: 0 50px 25px 50px; align-items: center; border-bottom: 1px dashed #ccc; padding-bottom: 10px;">
            <label style="width: 180px; font-size: 18px; font-weight: bold; color: #555;">Sở trường:</label>
            <label id="viewSotruong" style="font-size: 18px; color: black;"></label>
        </p>

        <p style="display: flex; margin: 0 50px 25px 50px; align-items: flex-start;">
            <label style="width: 180px; font-size: 18px; font-weight: bold; color: #555;">Mô tả sơ lược:</label>
            <label id="viewMota" style="flex: 1; font-size: 18px; color: black; line-height: 1.5; background-color: #fafafa; padding: 15px; border: 1px solid #eee; border-radius: 8px;"></label>
        </p>

        <p style="text-align: center; margin: 35px 0 0 0;">
            <a href="regis.html" style="text-decoration: none;">
                <button type="button" style="background-color: #8ba446; color: black; font-weight: bold; padding: 10px 40px; cursor: pointer; border: 1px solid #6e8534; border-radius: 6px; font-size: 18px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                    Quay lại Đăng ký
                </button>
            </a>
        </p>

    </form>

    <script>
        window.onload = function() {
            let data = localStorage.getItem('thongTinSinhVien');
            
            if (data) {
                let sinhVien = JSON.parse(data);
                
                // Thuộc tính textContent áp dụng được cho mọi loại thẻ (bao gồm cả <label>)
                document.getElementById('viewHoten').textContent = sinhVien.hoten;
                document.getElementById('viewNgaysinh').textContent = sinhVien.ngaysinh;
                document.getElementById('viewGioitinh').textContent = sinhVien.gioitinh;
                document.getElementById('viewDiachi').textContent = sinhVien.diachi;
                document.getElementById('viewMssv').textContent = sinhVien.mssv;
                document.getElementById('viewLop').textContent = sinhVien.lop;
                document.getElementById('viewSdt').textContent = sinhVien.sdt;
                document.getElementById('viewEmail').textContent = sinhVien.email;
                document.getElementById('viewSotruong').textContent = sinhVien.sotruong;
                document.getElementById('viewMota').textContent = sinhVien.mota;
            }
        };
    </script>
</body>
</html>
