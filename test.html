<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EdupiaAI - Demo</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
        }
    </style>
</head>
<body>
    <a href="pages/menu.html" style="position: fixed; bottom: 20px; left: 20px; background-color: #1a55bb; color: white; padding: 10px 20px; border-radius: 50px; text-decoration: none; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 9999;">
        &#8592; Trở về menu
    </a>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Lucide Icons as SVG components
        const Plus = ({ size = 24, className = "", strokeWidth = 2 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
        );

        const FileText = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
        );

        const Settings = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M12 1v6m0 6v6"></path>
                <path d="m4.93 4.93 4.24 4.24m5.66 5.66 4.24 4.24"></path>
                <path d="M1 12h6m6 0h6"></path>
                <path d="m4.93 19.07 4.24-4.24m5.66-5.66 4.24-4.24"></path>
            </svg>
        );

        const Send = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        );

        const Gamepad2 = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <line x1="6" y1="11" x2="10" y2="11"></line>
                <line x1="8" y1="9" x2="8" y2="13"></line>
                <line x1="15" y1="12" x2="15.01" y2="12"></line>
                <line x1="18" y1="10" x2="18.01" y2="10"></line>
                <path d="M17.32 5H6.68a4 4 0 0 0-3.978 3.59c-.006.052-.01.101-.017.152C2.604 9.416 2 14.456 2 16a3 3 0 0 0 3 3c1 0 1.5-.5 2-1l1.414-1.414A2 2 0 0 1 9.828 16h4.344a2 2 0 0 1 1.414.586L17 18c.5.5 1 1 2 1a3 3 0 0 0 3-3c0-1.545-.604-6.584-.685-7.258-.007-.05-.011-.1-.017-.151A4 4 0 0 0 17.32 5z"></path>
            </svg>
        );

        const ChevronRight = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
        );

        const Calendar = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
        );

        const Grid3x3 = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="9" y1="3" x2="9" y2="21"></line>
                <line x1="15" y1="3" x2="15" y2="21"></line>
                <line x1="3" y1="9" x2="21" y2="9"></line>
                <line x1="3" y1="15" x2="21" y2="15"></line>
            </svg>
        );

        const CheckSquare = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <polyline points="9 11 12 14 22 4"></polyline>
                <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
            </svg>
        );

        const FileCheck = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <path d="m9 15 2 2 4-4"></path>
            </svg>
        );

        function EdupiaAI() {
            const [message, setMessage] = useState('');
            const [messages, setMessages] = useState([]);
            const [activeDoc, setActiveDoc] = useState(null);

            const documents = [
                { id: 1, name: 'Tâm lý học nhận thức' },
                { id: 2, name: 'Cơ sở thần kinh học' }
            ];

            const tools = [
                { icon: Calendar, label: 'Lịch học', comingSoon: true },
                { icon: Grid3x3, label: 'Sơ đồ tư duy', comingSoon: true },
                { icon: CheckSquare, label: 'Checklist', comingSoon: true },
                { icon: FileCheck, label: 'Tóm tắt', comingSoon: true }
            ];

            const handleSendMessage = () => {
                if (message.trim()) {
                    setMessages([...messages, { text: message, sender: 'user' }]);
                    setMessage('');
                    
                    setTimeout(() => {
                        setMessages(prev => [...prev, { 
                            text: 'Tôi đã nhận được câu hỏi của bạn. Đây là câu trả lời mô phỏng từ EdupiaAI!', 
                            sender: 'ai' 
                        }]);
                    }, 1000);
                }
            };

            const handleKeyPress = (e) => {
                if (e.key === 'Enter') {
                    handleSendMessage();
                }
            };

            return (
                <div className="flex h-screen bg-gray-50 font-sans">
                    {/* Left Sidebar */}
                    <div className="w-64 bg-gradient-to-b from-blue-600 to-blue-700 text-white flex flex-col shadow-xl">
                        <div className="p-6">
                            <h1 className="text-2xl font-bold tracking-tight">EdupiaAI</h1>
                        </div>

                        <div className="px-4 mb-6">
                            <button className="w-full bg-blue-500 hover:bg-blue-400 rounded-lg py-3 px-4 flex items-center justify-center gap-2 transition-all duration-200 shadow-lg hover:shadow-xl transform hover:-translate-y-0.5">
                                <Plus size={20} strokeWidth={2.5} />
                                <span className="font-semibold">Thêm tài liệu mới</span>
                            </button>
                        </div>

                        <div className="px-4 mb-6">
                            <button className="w-full bg-white/10 hover:bg-white/20 rounded-lg py-3 px-4 flex items-center gap-2 text-white/70 hover:text-white transition-all duration-200">
                                <Plus size={18} />
                                <span className="text-sm">Tạo trang học mới...</span>
                            </button>
                        </div>

                        <div className="px-4 flex-1 overflow-y-auto">
                            <h3 className="text-xs font-semibold text-white/60 uppercase tracking-wider mb-3">
                                Tài liệu của bạn
                            </h3>
                            <div className="space-y-2">
                                {documents.map((doc) => (
                                    <button
                                        key={doc.id}
                                        onClick={() => setActiveDoc(doc.id)}
                                        className={`w-full text-left py-2.5 px-3 rounded-lg transition-all duration-200 flex items-center gap-3 ${
                                            activeDoc === doc.id
                                                ? 'bg-white/20 text-white'
                                                : 'hover:bg-white/10 text-white/90'
                                        }`}
                                    >
                                        <FileText size={16} />
                                        <span className="text-sm">{doc.name}</span>
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="p-4 border-t border-white/10">
                            <button className="flex items-center gap-3 text-white/70 hover:text-white transition-colors duration-200">
                                <Settings size={18} />
                                <span className="text-sm">Cài đặt</span>
                            </button>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1 flex flex-col">
                        {/* Header */}
                        <div className="bg-white border-b border-gray-200 px-8 py-4 flex items-center justify-end shadow-sm">
                            <div className="flex items-center gap-4">
                                <span className="text-gray-700 font-medium">vunhucan</span>
                                <button className="px-4 py-2 text-sm text-gray-600 hover:text-gray-900 hover:bg-gray-100 rounded-lg transition-colors duration-200">
                                    Đăng xuất
                                </button>
                            </div>
                        </div>

                        {/* Chat Area */}
                        <div className="flex-1 overflow-y-auto">
                            {messages.length === 0 ? (
                                <div className="h-full flex items-center justify-center">
                                    <div className="text-center max-w-md px-4">
                                        <div className="w-20 h-20 bg-blue-100 rounded-2xl flex items-center justify-center mx-auto mb-6 transform hover:scale-110 transition-transform duration-300">
                                            <Gamepad2 size={40} className="text-blue-600" />
                                        </div>
                                        <h2 className="text-2xl font-bold text-gray-900 mb-3">
                                            Xin chào, tôi có thể giúp gì cho bạn?
                                        </h2>
                                        <p className="text-gray-600 leading-relaxed">
                                            Hãy đặt câu hỏi về tài liệu hoặc sử dụng các công cụ hỗ trợ để nâng cao hiệu quả học tập.
                                        </p>
                                    </div>
                                </div>
                            ) : (
                                <div className="max-w-4xl mx-auto p-6 space-y-4">
                                    {messages.map((msg, index) => (
                                        <div
                                            key={index}
                                            className={`flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'}`}
                                        >
                                            <div
                                                className={`max-w-xl px-4 py-3 rounded-2xl ${
                                                    msg.sender === 'user'
                                                        ? 'bg-blue-600 text-white'
                                                        : 'bg-white text-gray-900 border border-gray-200 shadow-sm'
                                                }`}
                                            >
                                                {msg.text}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        {/* Input Area */}
                        <div className="p-6 bg-white border-t border-gray-200 shadow-lg">
                            <div className="max-w-4xl mx-auto">
                                <div className="relative">
                                    <input
                                        type="text"
                                        value={message}
                                        onChange={(e) => setMessage(e.target.value)}
                                        onKeyPress={handleKeyPress}
                                        placeholder="Nhập tin nhắn..."
                                        className="w-full px-5 py-4 pr-14 rounded-xl border border-gray-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition-all duration-200"
                                    />
                                    <button
                                        onClick={handleSendMessage}
                                        className="absolute right-3 top-1/2 -translate-y-1/2 w-10 h-10 bg-blue-600 hover:bg-blue-700 rounded-full flex items-center justify-center transition-all duration-200 transform hover:scale-110 shadow-md"
                                    >
                                        <Send size={18} className="text-white" />
                                    </button>
                                </div>
                                <p className="text-xs text-gray-500 text-center mt-3">
                                    AI có thể tạo ra thông tin không chính xác. Hãy kiểm tra lại.
                                </p>
                            </div>
                        </div>
                    </div>

                    {/* Right Panel */}
                    <div className="w-80 bg-white border-l border-gray-200 p-6 shadow-xl">
                        {/* Stats */}
                        <div className="grid grid-cols-2 gap-4 mb-8">
                            <div className="text-center bg-gradient-to-br from-blue-50 to-blue-100 rounded-xl p-4 hover:shadow-md transition-shadow duration-200">
                                <div className="text-sm text-gray-600 mb-1 font-medium">Tài liệu</div>
                                <div className="text-3xl font-bold text-blue-600">4</div>
                            </div>
                            <div className="text-center bg-gradient-to-br from-blue-50 to-blue-100 rounded-xl p-4 hover:shadow-md transition-shadow duration-200">
                                <div className="text-sm text-gray-600 mb-1 font-medium">Chat</div>
                                <div className="text-3xl font-bold text-blue-600">11</div>
                            </div>
                            <div className="text-center bg-gradient-to-br from-blue-50 to-blue-100 rounded-xl p-4 hover:shadow-md transition-shadow duration-200">
                                <div className="text-sm text-gray-600 mb-1 font-medium">Quiz</div>
                                <div className="text-3xl font-bold text-blue-600">25</div>
                            </div>
                            <div className="text-center bg-gradient-to-br from-blue-50 to-blue-100 rounded-xl p-4 hover:shadow-md transition-shadow duration-200">
                                <div className="text-sm text-gray-600 mb-1 font-medium">Thời gian học</div>
                                <div className="text-3xl font-bold text-blue-600">0</div>
                            </div>
                        </div>

                        {/* Tools */}
                        <div>
                            <h3 className="text-sm font-bold text-gray-900 uppercase tracking-wider mb-4">
                                Công cụ hỗ trợ
                            </h3>
                            <div className="space-y-3">
                                {/* Game Quiz - Active */}
                                <button className="w-full bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white rounded-xl px-4 py-3.5 flex items-center justify-between transition-all duration-200 group shadow-md hover:shadow-lg transform hover:-translate-y-0.5">
                                    <div className="flex items-center gap-3">
                                        <Gamepad2 size={20} />
                                        <span className="font-semibold">Game Quiz</span>
                                    </div>
                                    <ChevronRight size={20} className="group-hover:translate-x-1 transition-transform duration-200" />
                                </button>

                                {/* Other Tools - Coming Soon */}
                                {tools.map((tool, index) => (
                                    <div
                                        key={index}
                                        className="flex items-center justify-between px-4 py-3.5 rounded-xl border border-gray-200 bg-gray-50 hover:bg-gray-100 transition-colors duration-200"
                                    >
                                        <div className="flex items-center gap-3">
                                            <tool.icon size={20} className="text-gray-500" />
                                            <span className="font-medium text-gray-700">{tool.label}</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<EdupiaAI />);
    </script>
</body>
</html>
