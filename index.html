<!DOCTYPE html>
<html>
    <head>
        <title>Đăng Nhập</title>
    </head>
    <body bgcolor="#f0f0f0">

        <br><br>

        <table border="1" width="400" align="center" bgcolor="white" cellpadding="10" cellspacing="0">

            <tr>
                <td colspan="2" align="center" bgcolor="pink" height="50">
                    <h2>ĐĂNG NHẬP</h2>
                </td>
            </tr>

            <tr>
                <td width="35%" align="right"><b>Email:</b></td>
                <td>
                    <input type="email" name="email" placeholder="Nhập email" size="25">
                </td>
            </tr>

            <tr>
                <td align="right"><b>Mật khẩu:</b></td>
                <td>
                    <input type="password" name="matkhau" placeholder="Nhập mật khẩu" size="25">
                </td>
            </tr>

            <tr>
                <td colspan="2" align="center">
                    <input type="checkbox" name="ghonho"> Ghi nhớ đăng nhập
                </td>
            </tr>

            <tr>
                <td colspan="2" align="center">
                    <input type="button" value="Đăng Nhập" onclick="window.location.href='main.html'" style="background-color: pink; font-weight: bold; padding: 5px 20px; cursor: pointer;">
                    &nbsp;&nbsp;
                    <input type="reset" value="Xóa" style="padding: 5px 20px;">
                </td>
            </tr>

            <tr>
                <td colspan="2" align="center" bgcolor="#f9f9f9">
                    Chưa có tài khoản? 
                    <a href="register.html">Đăng ký ngay</a>
                </td>
            </tr>

        </table>

    </body>
</html>
